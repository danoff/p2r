name: Build & Deploy P2R Visualizer

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install root dependencies
        run: npm install

      - name: Validate & build data.json
        run: npm run build:data

      - name: Export PAR XML
        run: npm run export:par

      - name: Generate PAR HTML (via par_to_xhtml_1.xsl)
        run: |
          curl -fsSL https://raw.githubusercontent.com/Peeragogy/PeeragogicalActionReviews/master/par_to_xhtml_1.xsl \
            -o /tmp/par_to_xhtml_1.xsl
          mkdir -p site/public/par
          for f in reports/par/*.xml; do
            name=$(basename "$f" .xml)
            xsltproc /tmp/par_to_xhtml_1.xsl "$f" > "site/public/par/${name}.xhtml" 2>/dev/null || true
          done

      - name: Install site dependencies
        working-directory: site
        run: npm install

      - name: Build site
        working-directory: site
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
